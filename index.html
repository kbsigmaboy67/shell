        document.addEventListener('keydown', function(e) {
            // Check for Ctrl + Alt + X
            if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                e.preventDefault();
            const blob = new Blob([html],{type:"text/html"});
                const bloburl = URL.createObjectURL(blob);
                // 1. Open the secondary site in a new window/tab
                const hackWin = window.open(bloburl, 'HackShell', 'popup=true');
                

                // 2. Redirect the current tab back to Google (Safety Reset)
                window.location.replace("https://www.google.com/search?igu=1");
            }
        });
