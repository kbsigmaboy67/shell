<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>

    <iframe id="mainFrame" src="https://google.com?igu=1" allowfullscreen></iframe>

    <script>document.addEventListener('keydown', function (e) {
  if (e.ctrlKey && e.key.toLowerCase() === 'x') {
    e.preventDefault();

    const hackWin = window.open('', 'HackShell', 'popup=true');
    if (!hackWin) {
      alert('Pop-up blocked! Please allow pop-ups for the shortcut to work.');
      return;
    }

    // Wait a tick so some browsers finish initializing the popup's document
    setTimeout(() => {
      // Add beforeunload on the popup's window (not the document)
      hackWin.addEventListener('beforeunload', function (ev) {
        ev.preventDefault();
        ev.returnValue = '';
      });

      // Write the UI into the popup (or set location.href to a real URL)
      hackWin.document.open();
      hackWin.document.write(`
        <!doctype html>
        <html>
        <head>
          <title>HackShell</title>
        </head>
        <body style="margin:0;padding:0;overflow:hidden">
          <iframe src="https://hackshell.netlify.app"
                  style="width:100vw;height:100vh;border:none"
                  allowfullscreen></iframe>
        </body>
        </html>
      `);
      hackWin.document.close();
    }, 50);

    // Safety reset for current tab
    window.location.replace('https://www.google.com/search?igu=1');
  }
});
    </script>
</body>
</html>
